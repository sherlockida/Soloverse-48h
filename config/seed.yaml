#  ① Alice ↔ Bob ↔ Frank（火灾真相 → 信任崩塌）
#  ② Carol ↔ Dan ↔ Alice（三角恋 → 嫉妒）
#  ③ Grace ↔ Bob（秘密目击 → 童言炸弹）
